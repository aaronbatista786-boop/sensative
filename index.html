<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensative</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header{
    padding:60px 20px;
    background:linear-gradient(135deg,#00ff88,#006644);
}

h1{
    font-size:55px;
    margin:0;
}

p{
    font-size:20px;
}

.container{
    padding:40px 20px;
}

.card{
    background:#1c1c1c;
    margin:20px auto;
    padding:25px;
    border-radius:20px;
    max-width:500px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

a{
    color:#00ff88;
    text-decoration:none;
    font-weight:bold;
}

footer{
    margin-top:40px;
    padding:20px;
    background:#111;
}
</style>
</head>

<body>

<header>
    <h1>Sensative</h1>
    <p>Gaming • Roblox • Noticias • Guías</p>
</header>

<div class="container">

<div class="card">
    <h2>Roblox</h2>
    <p>Noticias y eventos de Roblox actualizados.</p>
</div>

<div class="card">
    <h2>Free Fire</h2>
    <p>Sensibilidades, configuraciones y más.</p>
</div>

<div class="card">
    <h2>TikTok</h2>
    <p>Contenido viral y tendencias.</p>
</div>

</div>

<footer>
© 2026 Sensative
</footer>

</body>
</html>
